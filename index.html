<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Forest Sentinel: Firebreak Command</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    
    <!-- Phaser 3 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background-color: #070b13; font-family: 'Inter', sans-serif;
            color: #e2e8f0;
        }

        /* Portrait Layout */
        .app-container {
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
        }

        .map-section {
            flex: 0 0 70%;
            height: 70%;
            width: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #phaser-game {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dashboard-section {
            flex: 0 0 30%;
            height: 30%;
            width: 100%;
            background: rgba(13, 20, 35, 0.95);
            border-top: 2px solid rgba(0, 229, 255, 0.2);
            padding: 10px;
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: space-around;
            align-content: flex-start;
            gap: 10px;
            z-index: 10;
            overflow-y: auto;
        }

        /* Panels */
        .panel {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 229, 255, 0.1);
            border-radius: 8px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1 1 30%;
            min-width: 120px;
        }

        .panel-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            color: #00E5FF;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            width: 100%;
            text-align: center;
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
            padding-bottom: 5px;
        }

        /* Match Timer */
        .timer-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        /* Wind Indicator */
        .compass-ring {
            width: 80px; height: 80px;
            border: 2px dashed rgba(255,255,255,0.3);
            border-radius: 50%;
            position: relative;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 10px;
        }
        .compass-label { position: absolute; font-size: 10px; font-weight: bold; color: #94a3b8; }
        .compass-n { top: -14px; }
        .compass-s { bottom: -14px; }
        .compass-e { right: -14px; }
        .compass-w { left: -14px; }

        .compass-arrow {
            width: 0; height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-bottom: 35px solid #D84315;
            transition: transform 0.5s ease;
        }

        .wind-ticker {
            width: 100%;
            background: rgba(0,0,0,0.5);
            padding: 8px;
            font-size: 10px;
            font-family: monospace;
            color: #00E5FF;
            text-align: center;
            border-radius: 4px;
            border-left: 3px solid #00E5FF;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .wind-ticker.warning {
            color: #ff5252;
            border-left-color: #ff5252;
            animation: pulse-red 1s infinite;
        }

        /* Tool Modes */
        .tools-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
        }

        .nodes-badge {
            background: #00E676; color: #000;
            font-size: 14px; font-weight: bold; font-family: 'Orbitron';
            padding: 4px 10px; border-radius: 10px;
            display: inline-block;
        }

        /* Screens */
        .screen-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex; align-items: center; justify-content: center;
            z-index: 100;
            backdrop-filter: blur(5px);
        }
        .screen-overlay.hidden { display: none; }
        
        .modal-card {
            background: rgba(13, 20, 35, 0.95);
            border: 2px solid #00E5FF;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            max-width: 500px;
        }
        .modal-card.loss { border-color: #ff5252; box-shadow: 0 0 20px rgba(255,82,82,0.4); }
        .modal-card.win { border-color: #4caf50; box-shadow: 0 0 20px rgba(76,175,80,0.4); }

        .modal-title { font-family: 'Orbitron'; font-size: 28px; margin-bottom: 10px; text-transform: uppercase; }
        .modal-card.loss .modal-title { color: #ff5252; }
        .modal-card.win .modal-title { color: #4caf50; }

        .btn-action {
            background: #00E5FF; color: #000; border: none; padding: 12px 24px;
            font-family: 'Orbitron'; font-weight: bold; cursor: pointer;
            border-radius: 6px; margin-top: 20px; transition: transform 0.1s;
        }
        .btn-action:active { transform: scale(0.95); }

        @keyframes pulse-red {
            0% { opacity: 0.8; }
            50% { opacity: 0.4; }
            100% { opacity: 0.8; }
        }

        /* Mobile specific adjustments to ensure everything fits */
        @media (max-width: 900px) {
            .dashboard-section { padding: 5px; gap: 5px; }
            .panel { padding: 5px; min-width: 100px; }
            .timer-value { font-size: 20px; }
            .compass-ring { width: 40px; height: 40px; margin-bottom: 5px; border-width: 1px; }
            .compass-arrow { border-left: 5px solid transparent; border-right: 5px solid transparent; border-bottom: 20px solid #D84315; }
            .wind-ticker { font-size: 8px; min-height: 20px; padding: 4px; }
            .nodes-badge { font-size: 10px; padding: 2px 6px; }
            .panel-title { font-size: 9px; margin-bottom: 5px; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- 75% Tactical Grid -->
        <main class="map-section">
            <div id="phaser-game"></div>
            
            <!-- Overlays -->
            <div class="screen-overlay" id="screen-start">
                <div class="modal-card">
                    <h2 class="modal-title" style="color:#00E5FF">MISSION BRIEFING</h2>
                    <p style="font-size: 14px; margin-bottom: 20px; color: #94a3b8;">
                        Protect the Gold Assets at the top. Use tools to establish a firebreak before time runs out.
                    </p>
                    <button class="btn-action" id="btn-start">COMMENCE OPERATIONS</button>
                </div>
            </div>

            <div class="screen-overlay hidden" id="screen-end">
                <div class="modal-card" id="end-card">
                    <h2 class="modal-title" id="end-title">TITLE</h2>
                    <p id="end-desc" style="font-size: 14px; color: #94a3b8;"></p>
                    <button class="btn-action" id="btn-restart">RESTART MISSION</button>
                </div>
            </div>
        </main>

        <!-- 25% Dashboard -->
        <aside class="dashboard-section">
            <div class="panel">
                <div class="panel-title">MATCH TIMER</div>
                <div class="timer-value" id="ui-timer">90.0</div>
            </div>

            <div class="panel">
                <div class="panel-title">WIND TELEMETRY</div>
                <div class="compass-ring">
                    <span class="compass-label compass-n">N</span>
                    <span class="compass-label compass-s">S</span>
                    <span class="compass-label compass-e">E</span>
                    <span class="compass-label compass-w">W</span>
                    <div class="compass-arrow" id="ui-compass"></div>
                </div>
                <div class="wind-ticker" id="ui-ticker">
                    SYSTEM NOMINAL.<br>Wind: NORTH
                </div>
            </div>

            <div class="panel tools-container">
                <div class="panel-title">TACTICAL COMMAND</div>
                <div style="font-size: 12px; color: #94a3b8; text-align: center; margin-bottom: 10px;">
                    Draw backburn line on the grid.
                </div>
                <div class="nodes-badge" id="ui-nodes" style="margin-bottom: 15px;">0 / 40</div>
                <button class="btn-action" id="btn-initiate-backburn" style="margin-top: 0; width: 100%; font-size: 14px; padding: 10px;">INITIATE BACKBURN</button>
            </div>
        </aside>
    </div>

    <script>
        class GameScene extends Phaser.Scene {
            constructor() {
                super('GameScene');
            }

            init() {
                this.COLS = 14;
                this.ROWS = 24;
                
                this.cellWidth = 0;
                this.cellHeight = 0;
                
                this.grid = []; // 2D array of states: 0=Forest, 1=Fire, 2=Charcoal, 3=Asset
                this.rects = []; // Visual rectangles
                
                this.nodes = []; // Array of {r, c, x, y, visual}
                this.maxNodes = 40;
                
                this.timeLeft = 90.0;
                this.tickTimer = 2.0;
                
                this.windDir = 'North';
                this.nextWindDir = '';
                
                this.isPlaying = false;
                
                // Track wind shifts (60s and 30s)
                this.shift60Done = false;
                this.shift30Done = false;
                this.nextWindScheduled = false;
            }

            create() {
                const width = this.cameras.main.width;
                const height = this.cameras.main.height;
                
                // Allow slightly smaller grid to fit bounds
                const margin = 10;
                const availableW = width - margin * 2;
                const availableH = height - margin * 2;
                
                this.cellWidth = availableW / this.COLS;
                this.cellHeight = availableH / this.ROWS;

                // Center offsets
                this.offsetX = margin;
                this.offsetY = margin;

                this.buildGrid();
                
                this.nodeLayer = this.add.container(0, 0);

                this.input.on('pointerdown', this.handlePointer, this);
                this.input.on('pointermove', (pointer) => {
                    if (pointer.isDown) this.handlePointer(pointer);
                }, this);

                // Initial dashboard sync
                this.updateCompassVisual();
                document.getElementById('ui-nodes').innerText = `0 / ${this.maxNodes}`;
                
                // Bind tools UI
                document.getElementById('btn-initiate-backburn').onclick = () => {
                    if (!this.isPlaying) return;
                    for (let node of this.nodes) {
                        if (this.grid[node.r][node.c] === 0) {
                            this.grid[node.r][node.c] = 2; // Charcoal
                        }
                        node.visuals.forEach(v => v.destroy());
                    }
                    this.nodes = [];
                    document.getElementById('ui-nodes').innerText = `0 / ${this.maxNodes}`;
                    this.updateGridVisuals();
                };

                // Bind Start
                document.getElementById('btn-start').onclick = () => {
                    document.getElementById('screen-start').classList.add('hidden');
                    this.startGame();
                };
                document.getElementById('btn-restart').onclick = () => {
                    document.getElementById('screen-end').classList.add('hidden');
                    this.scene.restart();
                };
            }

            buildGrid() {
                for (let r = 0; r < this.ROWS; r++) {
                    const rowStates = [];
                    const rowRects = [];
                    for (let c = 0; c < this.COLS; c++) {
                        let state = 0;
                        if (r === 0) state = 3; // Top row is Defended Asset
                        else if (r === this.ROWS - 1 && (c === Math.floor(this.COLS/2) || c === Math.floor(this.COLS/2)-1)) state = 1; // Start fire at bottom
                        
                        rowStates.push(state);
                        
                        let rect = this.add.rectangle(
                            this.offsetX + c * this.cellWidth + this.cellWidth/2,
                            this.offsetY + r * this.cellHeight + this.cellHeight/2,
                            this.cellWidth - 2,
                            this.cellHeight - 2,
                            this.getColor(state)
                        );
                        rect.setStrokeStyle(1, 0x000000);
                        
                        rowRects.push(rect);
                    }
                    this.grid.push(rowStates);
                    this.rects.push(rowRects);
                }
            }

            getColor(state) {
                if (state === 0) return 0x2E7D32; // Forest
                if (state === 1) return 0xD84315; // Fire
                if (state === 2) return 0x37474F; // Controlled
                if (state === 3) return 0xFBC02D; // Asset
                return 0x000000;
            }

            updateGridVisuals() {
                for (let r = 0; r < this.ROWS; r++) {
                    for (let c = 0; c < this.COLS; c++) {
                        this.rects[r][c].setFillStyle(this.getColor(this.grid[r][c]));
                    }
                }
            }

            handlePointer(pointer) {
                if (!this.isPlaying) return;

                const c = Math.floor((pointer.x - this.offsetX) / this.cellWidth);
                const r = Math.floor((pointer.y - this.offsetY) / this.cellHeight);
                
                if (c < 0 || c >= this.COLS || r < 0 || r >= this.ROWS) return;

                const state = this.grid[r][c];
                
                // Only on active forest
                if (state !== 0 || r === 0) return;
                
                // Check if node already exists here
                if (this.nodes.some(n => n.r === r && n.c === c)) return;

                if (this.nodes.length >= this.maxNodes) return; 

                const cx = this.offsetX + c * this.cellWidth + this.cellWidth/2;
                const cy = this.offsetY + r * this.cellHeight + this.cellHeight/2;

                let marker = this.add.rectangle(cx, cy, this.cellWidth * 0.6, this.cellHeight * 0.6, 0x00E5FF, 0.5);
                marker.setStrokeStyle(2, 0x00E5FF);
                
                this.nodeLayer.add(marker);

                this.nodes.push({ r, c, x: cx, y: cy, visuals: [marker] });
                document.getElementById('ui-nodes').innerText = `${this.nodes.length} / ${this.maxNodes}`;
            }

            update(time, delta) {
                if (!this.isPlaying) return;
                
                const dt = delta / 1000;
                
                // Match Timer
                this.timeLeft -= dt;
                if (this.timeLeft <= 0) {
                    this.timeLeft = 0;
                    this.checkWinLoss(); // Force final check and end game
                }
                document.getElementById('ui-timer').innerText = this.timeLeft.toFixed(1);

                // Wind Shift Events schedule
                if (this.timeLeft <= 65 && !this.nextWindScheduled && !this.shift60Done) {
                    this.scheduleWindShift(60);
                }
                if (this.timeLeft <= 35 && !this.nextWindScheduled && !this.shift30Done) {
                    this.scheduleWindShift(30);
                }

                // Execute Wind Shift
                if (this.nextWindScheduled) {
                    if ((this.shift60Done === false && this.timeLeft <= 60) || 
                        (this.shift30Done === false && this.timeLeft <= 30)) {
                        
                        this.windDir = this.nextWindDir;
                        this.nextWindScheduled = false;
                        
                        if (this.timeLeft <= 60 && this.timeLeft > 30) this.shift60Done = true;
                        if (this.timeLeft <= 30) this.shift30Done = true;

                        this.updateCompassVisual();
                        this.setTicker(`WIND SHIFTED TO ${this.windDir.toUpperCase()}`, false);
                    }
                }

                // Fire Spread Tick
                this.tickTimer -= dt;
                if (this.tickTimer <= 0) {
                    this.tickTimer = 2.0;
                    this.processFireSpread();
                    this.checkWinLoss();
                }
            }

            scheduleWindShift(timeTarget) {
                this.nextWindScheduled = true;
                const options = ['East', 'West'];
                this.nextWindDir = options[Math.floor(Math.random() * options.length)];
                
                this.showScanTicker();
            }

            showScanTicker() {
                let timeToShift = 0;
                if (!this.shift60Done && this.timeLeft > 60) timeToShift = Math.max(0, this.timeLeft - 60);
                else if (!this.shift30Done && this.timeLeft > 30) timeToShift = Math.max(0, this.timeLeft - 30);
                
                this.setTicker(`WARNING: Wind shifting ${this.nextWindDir.toUpperCase()} in ${timeToShift.toFixed(0)} seconds`, true);
            }

            setTicker(htmlMsg, isWarning) {
                const el = document.getElementById('ui-ticker');
                el.innerHTML = htmlMsg;
                if (isWarning) el.classList.add('warning');
                else el.classList.remove('warning');
            }

            updateCompassVisual() {
                const arrow = document.getElementById('ui-compass');
                let rotation = 0;
                if (this.windDir === 'East') rotation = 90;
                if (this.windDir === 'South') rotation = 180;
                if (this.windDir === 'West') rotation = 270;
                if (this.windDir === 'North') rotation = 0;
                
                arrow.style.transform = `rotate(${rotation}deg)`;
            }

            processFireSpread() {
                let newGrid = this.grid.map(row => [...row]);

                // 100% downwind, 25% crosswind, 0% upwind
                const getSpreadProb = (currentWind, targetDir) => {
                    if (currentWind === targetDir) return 1.0;
                    
                    const opposites = { 'North':'South', 'South':'North', 'East':'West', 'West':'East' };
                    if (opposites[currentWind] === targetDir) return 0.0;
                    
                    return 0.25; // crosswind
                };

                for (let r = 0; r < this.ROWS; r++) {
                    for (let c = 0; c < this.COLS; c++) {
                        if (this.grid[r][c] === 1) {
                            // Check neighbors
                            const neighbors = [
                                { dr: -1, dc: 0, dir: 'North' },
                                { dr: 1, dc: 0, dir: 'South' },
                                { dr: 0, dc: -1, dir: 'West' },
                                { dr: 0, dc: 1, dir: 'East' }
                            ];

                            for (let n of neighbors) {
                                let nr = r + n.dr;
                                let nc = c + n.dc;
                                
                                if (nr >= 0 && nr < this.ROWS && nc >= 0 && nc < this.COLS) {
                                    // Can only ignite 0 (Forest) or 3 (Asset)
                                    if (this.grid[nr][nc] === 0 || this.grid[nr][nc] === 3) {
                                        let prob = getSpreadProb(this.windDir, n.dir);
                                        if (Math.random() < prob) {
                                            newGrid[nr][nc] = 1;
                                            
                                            // Destroy node if it was here
                                            let nodeIndex = this.nodes.findIndex(node => node.r === nr && node.c === nc);
                                            if (nodeIndex !== -1) {
                                                this.nodes[nodeIndex].visuals.forEach(v => v.destroy());
                                                this.nodes.splice(nodeIndex, 1);
                                                document.getElementById('ui-nodes').innerText = `${this.nodes.length} / ${this.maxNodes}`;
                                            }
                                        }
                                    }
                                }
                            }
                        }
                    }
                }
                
                this.grid = newGrid;
                this.updateGridVisuals();
            }

            checkWinLoss() {
                if (!this.isPlaying) return;

                // Check Defeat: Any Gold asset on fire
                let loss = false;
                let assetRemaining = 0;
                
                for (let c = 0; c < this.COLS; c++) {
                    if (this.grid[0][c] === 1) {
                        loss = true;
                        break;
                    }
                    if (this.grid[0][c] === 3) {
                        assetRemaining++;
                    }
                }

                if (loss) {
                    this.endGame(false, "Asset burned! The wildfire breached the containment line.");
                    return;
                }

                // Check Win
                if (this.timeLeft <= 0) {
                    if (assetRemaining > 0) {
                        this.endGame(true, "Time expired! The containment forces have arrived to secure the remaining assets.");
                    } else {
                        // Edge case where time is 0 but no assets remain, though caught by loss check
                        this.endGame(false, "No assets remain.");
                    }
                }
            }

            endGame(isWin, desc) {
                this.isPlaying = false;
                
                const screen = document.getElementById('screen-end');
                const card = document.getElementById('end-card');
                const title = document.getElementById('end-title');
                const descEl = document.getElementById('end-desc');
                
                screen.classList.remove('hidden');
                
                if (isWin) {
                    card.className = "modal-card win";
                    title.innerText = "VICTORY";
                } else {
                    card.className = "modal-card loss";
                    title.innerText = "DEFEAT";
                }
                
                descEl.innerText = desc;
            }

            startGame() {
                this.isPlaying = true;
            }
        }

        const config = {
            type: Phaser.AUTO,
            width: 600, // Virtual resolution to be scaled
            height: 800,
            parent: 'phaser-game',
            transparent: true,
            scale: {
                mode: Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH
            },
            scene: [GameScene]
        };

        const game = new Phaser.Game(config);
    </script>
</body>
</html>
